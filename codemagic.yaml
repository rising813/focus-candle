workflows:

  # ─────────────────────────────────────────────────────────────────────────
  # Focus Candle — Android Debug APK
  # Trigger: every push to any branch
  # ─────────────────────────────────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 30

    environment:
      flutter: stable
      java: 17
      groups:
        - default

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "*"
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK
        script: |
          flutter build apk \
            --debug \
            --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────
  # Focus Candle — Android Release APK + AAB
  # Trigger: push to main/master only
  # ─────────────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release (APK + AAB)
    max_build_duration: 45

    environment:
      flutter: stable
      java: 17
      groups:
        - default
      vars:
        # These override the debug signing used in development.
        # Add your keystore to Codemagic → Teams → Integrations → Code signing
        # or set as environment variable group secrets below.
        PACKAGE_NAME: "com.example.focus_candle"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
        - pattern: "master"
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build release APK
        script: |
          flutter build apk \
            --release \
            --no-tree-shake-icons

      - name: Build release App Bundle (AAB)
        script: |
          flutter build appbundle \
            --release \
            --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
